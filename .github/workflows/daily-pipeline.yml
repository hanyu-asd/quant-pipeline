name: 每日选股与分析

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 工作日北京时间 18:30
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd daily_stock_analysis
          pip install -r requirements.txt
          pip install -e .
          pip install fake_useragent sqlalchemy
          cd ../alphasift
          pip install -e .
          cd ../alphaevo
          pip install -e .

      - name: AlphaSift 全市场扫描
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphasift
          alphasift screen balanced_alpha --no-llm --save-run --market cn
          mkdir -p ../shared
          cp data/runs/*.json ../shared/candidates.json 2>/dev/null || echo '{"picks":[]}' > ../shared/candidates.json

      - name: 解析选股结果并注入环境变量
        id: pass_stocks
        run: |
          if [ -f shared/candidates.json ] && [ -s shared/candidates.json ]; then
            STOCKS=$(jq -r '.picks[]? | .code' shared/candidates.json | head -10 | tr '\n' ',' | sed 's/,$//')
            echo "STOCK_LIST=$STOCKS" >> $GITHUB_ENV
            echo "已提取股票列表: $STOCKS"
          else
            echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> $GITHUB_ENV
          fi

      - name: daily_stock_analysis 深度分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          STOCK_LIST: ${{ env.STOCK_LIST }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cd daily_stock_analysis
          python main.py

      - name: 计算候选股买卖价格（AlphaEvo 定价）
        run: |
          echo "📊 买卖价格参考（基于 rsi_reversion 策略）" > pricing.txt
          echo "" >> pricing.txt
          echo "候选股列表: ${{ env.STOCK_LIST }}" >> pricing.txt
          echo "详细价格计算脚本待完善，当前为占位输出。" >> pricing.txt

      - name: 上传每日报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-reports
          path: |
            daily_stock_analysis/reports/
            alphasift/data/runs/
            shared/
            pricing.txt