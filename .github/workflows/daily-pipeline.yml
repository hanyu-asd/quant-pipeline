name: 每日选股与分析

on:
  schedule:
    - cron: '30 10 * * 1-5'   # 工作日北京时间 18:30
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 禁用 Git 符号链接（避免 File name too long）
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd daily_stock_analysis
          pip install -r requirements.txt
          pip install -e .
          pip install fake_useragent sqlalchemy pyyaml
          cd ../alphasift
          pip install -e .
          cd ../alphaevo
          pip install -e .

      - name: AlphaSift 全市场扫描
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphasift
          alphasift screen balanced_alpha --no-llm --save-run --market cn
          mkdir -p ../shared
          cp data/runs/*.json ../shared/candidates.json 2>/dev/null || echo '{"picks":[]}' > ../shared/candidates.json

      - name: 解析选股结果并注入环境变量
        id: pass_stocks
        run: |
          if [ -f shared/candidates.json ] && [ -s shared/candidates.json ]; then
            STOCKS=$(jq -r '.picks[]? | .code' shared/candidates.json | head -10 | tr '\n' ',' | sed 's/,$//')
            echo "STOCK_LIST=$STOCKS" >> $GITHUB_ENV
            echo "已提取股票列表: $STOCKS"
          else
            echo "STOCK_LIST=${{ secrets.STOCK_LIST }}" >> $GITHUB_ENV
          fi

      - name: daily_stock_analysis 深度分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          STOCK_LIST: ${{ env.STOCK_LIST }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cd daily_stock_analysis
          python main.py

      - name: 计算候选股买卖价格（AlphaEvo 定价）
        run: |
          cat > pricing_calculator.py << 'EOF'
          import yaml
          import json
          import os
          import sys
          import requests
          from datetime import datetime

          def load_market_state():
              state_file = "market_state.json"
              if not os.path.exists(state_file):
                  state_file = "daily_stock_analysis/reports/market_state.json"
              if os.path.exists(state_file):
                  try:
                      with open(state_file, 'r') as f:
                          state = json.load(f)
                          strategy = state.get('strategy', 'rsi_reversion_v1')
                          print(f"📊 当前市场状态: {state.get('trend_desc', '未知')}")
                          print(f"📊 使用策略: {strategy}")
                          return strategy
                  except Exception as e:
                      print(f"⚠️ 读取市场状态失败: {e}")
              print("⚠️ 未找到市场状态文件，使用默认策略: rsi_reversion_v1")
              return "rsi_reversion_v1"

          def load_candidates():
              candidates_file = "shared/candidates.json"
              if not os.path.exists(candidates_file):
                  print("候选股文件不存在，跳过定价计算")
                  return []
              with open(candidates_file, 'r') as f:
                  data = json.load(f)
              picks = data.get('picks', [])
              return [item['code'] for item in picks if 'code' in item]

          def load_strategy(strategy_name):
              strategy_file = f"alphaevo/strategies/builtin/{strategy_name}.yaml"
              if not os.path.exists(strategy_file):
                  strategy_file = f"alphaevo/strategies/{strategy_name}.yaml"
                  if not os.path.exists(strategy_file):
                      print(f"⚠️ 策略文件不存在: {strategy_file}")
                      return None
              with open(strategy_file, 'r') as f:
                  return yaml.safe_load(f)

          def get_stock_realtime_price(stock_code):
              try:
                  url = f"https://qt.gtimg.cn/q=sh{stock_code}"
                  response = requests.get(url, timeout=5)
                  if response.status_code == 200:
                      parts = response.text.split('~')
                      if len(parts) > 3:
                          return float(parts[3])
                  return None
              except:
                  return None

          def calculate_pricing(strategy, stock_code):
              current_price = get_stock_realtime_price(stock_code)
              if current_price is None:
                  return {"buy_price": 0, "stop_loss": 0, "take_profit": 0, "signal": "无法获取价格", "current_price": 0}

              exit_params = strategy.get('exit', {})
              stop_loss_pct = exit_params.get('stop_loss', {}).get('value', 0.05)
              take_profit_pct = exit_params.get('take_profit', {}).get('value', 2.0)

              buy_price = current_price * (1 - 0.02)
              stop_loss = buy_price * (1 - stop_loss_pct)
              take_profit = buy_price * (1 + take_profit_pct * 0.01)

              signal = "观望"
              if current_price <= buy_price:
                  signal = "买入"
              elif current_price >= take_profit:
                  signal = "卖出"

              return {
                  "buy_price": buy_price,
                  "stop_loss": stop_loss,
                  "take_profit": take_profit,
                  "current_price": current_price,
                  "signal": signal
              }

          def main():
              strategy_name = load_market_state()
              candidates = load_candidates()
              if not candidates:
                  print("没有候选股，定价计算跳过")
                  sys.exit(0)

              strategy = load_strategy(strategy_name)
              if not strategy:
                  print(f"⚠️ 无法加载策略: {strategy_name}，使用默认策略")
                  strategy = load_strategy("rsi_reversion_v1")
                  if not strategy:
                      print("❌ 无法加载任何策略，定价计算失败")
                      sys.exit(1)

              report_lines = [
                  "📊 买卖价格参考",
                  "=" * 50,
                  f"使用策略: {strategy_name}",
                  f"生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}",
                  ""
              ]

              for code in candidates:
                  pricing = calculate_pricing(strategy, code)
                  if pricing.get("buy_price", 0) == 0:
                      report_lines.append(f"股票代码: {code} → 无法获取价格")
                      continue

                  report_lines.append(f"股票代码: {code}")
                  report_lines.append(f"  当前价: {pricing['current_price']:.2f}")
                  report_lines.append(f"  买入触发价: {pricing['buy_price']:.2f}")
                  report_lines.append(f"  止损价: {pricing['stop_loss']:.2f}")
                  report_lines.append(f"  止盈价: {pricing['take_profit']:.2f}")
                  report_lines.append(f"  信号: {pricing['signal']}")
                  report_lines.append("")

              with open("pricing.txt", "w", encoding="utf-8") as f:
                  f.write("\n".join(report_lines))
              print("✅ 定价报告已生成: pricing.txt")

          if __name__ == "__main__":
              main()
          EOF

          python pricing_calculator.py

      - name: 发送买卖价格参考邮件
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          cat > send_pricing_email.py << 'EOF'
          import smtplib
          from email.mime.text import MIMEText
          import os

          sender = os.environ.get('EMAIL_SENDER')
          password = os.environ.get('EMAIL_PASSWORD')
          receivers_str = os.environ.get('EMAIL_RECEIVERS', '')
          receivers = [r.strip() for r in receivers_str.split(',') if r.strip()]

          if not sender or not password or not receivers:
              print("邮件配置不完整，跳过发送")
              exit(0)

          try:
              with open('pricing.txt', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              content = "今日无候选股，无法生成买卖价格参考。"
              print("pricing.txt 不存在，发送占位邮件")

          subject = '📊 每日买卖价格参考'
          msg = MIMEText(content, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From'] = sender
          msg['To'] = ', '.join(receivers)

          try:
              with smtplib.SMTP_SSL('smtp.qq.com', 465) as server:
                  server.login(sender, password)
                  server.sendmail(sender, receivers, msg.as_string())
              print("买卖价格参考邮件已发送")
          except Exception as e:
              print(f"邮件发送失败: {e}")
              exit(1)
          EOF

          python send_pricing_email.py

      - name: 上传每日报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-reports
          path: |
            daily_stock_analysis/reports/
            alphasift/data/runs/
            shared/
            pricing.txt