name: 每周策略进化

on:
  schedule:
    - cron: '0 12 * * 5'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd alphaevo
          pip install -e .

      - name: Run AlphaEvo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphaevo
          alphaevo evolve rsi_reversion --method llm --rounds 5 --samples 90

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-evo-reports
          path: alphaevo/reports/