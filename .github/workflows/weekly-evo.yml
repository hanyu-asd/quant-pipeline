name: 每周策略进化

on:
  schedule:
    - cron: '0 12 * * 5'   # 每周五北京时间 20:00
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd alphaevo
          pip install -e .
          pip install requests baostock efinance akshare

      - name: 自动判断市场状态并选择策略
        id: select_strategy
        run: |
          cd ${{ github.workspace }}
          python scripts/select_strategy.py
          STRATEGY=$(cat selected_strategy.txt)
          echo "SELECTED_STRATEGY=$STRATEGY" >> $GITHUB_ENV
          echo "本周选定的策略: $STRATEGY"

      - name: 准备策略文件
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          echo "选定的策略: $STRATEGY"
          
          # 策略文件名映射：rsi_reversion_v1 → rsi_reversion
          if [ "$STRATEGY" == "rsi_reversion_v1" ]; then
            STRATEGY_FILE="rsi_reversion"
          else
            STRATEGY_FILE="$STRATEGY"
          fi
          
          # 检查并复制策略文件
          if [ -f "strategies/builtin/${STRATEGY_FILE}.yaml" ]; then
            cp strategies/builtin/${STRATEGY_FILE}.yaml strategies/${STRATEGY_FILE}.yaml
            echo "✅ 已复制策略文件: ${STRATEGY_FILE}.yaml"
          else
            echo "⚠️ 策略文件不存在: strategies/builtin/${STRATEGY_FILE}.yaml"
            echo "📂 查看 strategies/builtin/ 目录内容:"
            ls -la strategies/builtin/
            exit 1
          fi
          
          # 设置导入用的策略名（使用文件的 ID）
          if [ "$STRATEGY" == "rsi_reversion_v1" ]; then
            echo "IMPORT_STRATEGY=rsi_reversion_v1" >> $GITHUB_ENV
          else
            echo "IMPORT_STRATEGY=$STRATEGY" >> $GITHUB_ENV
          fi

      - name: 导入策略
        run: |
          cd alphaevo
          STRATEGY="${{ env.IMPORT_STRATEGY }}"
          if [ "$STRATEGY" == "rsi_reversion_v1" ]; then
            alphaevo strategy import strategies/rsi_reversion.yaml || true
          else
            alphaevo strategy import strategies/${STRATEGY}.yaml || true
          fi
          alphaevo strategy list

      - name: Run AlphaEvo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphaevo
          STRATEGY="${{ env.IMPORT_STRATEGY }}"
          echo "🚀 开始进化策略: $STRATEGY"
          alphaevo evolve $STRATEGY --method llm --rounds 5 --samples 90

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-evo-reports
          path: |
            alphaevo/reports/
            selected_strategy.txt
            market_state.json