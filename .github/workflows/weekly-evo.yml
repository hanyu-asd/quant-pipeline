name: 每周策略进化

on:
  schedule:
    - cron: '0 12 * * 5'   # 每周五北京时间 20:00
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd alphaevo
          pip install -e .
          pip install requests

      - name: 自动判断市场状态并选择策略（腾讯财经 API）
        id: select_strategy
        run: |
          cd ${{ github.workspace }}
          python scripts/select_strategy.py
          STRATEGY=$(cat selected_strategy.txt)
          echo "SELECTED_STRATEGY=$STRATEGY" >> $GITHUB_ENV
          echo "本周选定的策略: $STRATEGY"

      - name: 准备策略文件
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          if [ -f "strategies/builtin/${STRATEGY}.yaml" ]; then
            cp strategies/builtin/${STRATEGY}.yaml strategies/${STRATEGY}.yaml
            echo "✅ 已复制策略文件: ${STRATEGY}.yaml"
          else
            echo "⚠️ 策略文件不存在: ${STRATEGY}.yaml"
          fi

      - name: 导入策略
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          alphaevo strategy import strategies/${STRATEGY}.yaml || true
          alphaevo strategy list

      - name: Run AlphaEvo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          echo "🚀 开始进化策略: $STRATEGY"
          alphaevo evolve $STRATEGY --method llm --rounds 5 --samples 90

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-evo-reports
          path: |
            alphaevo/reports/
            selected_strategy.txt
            market_state.json