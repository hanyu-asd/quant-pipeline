name: 每周策略进化

on:
  schedule:
    - cron: '0 12 * * 5'
  workflow_dispatch:
    inputs:
      strategy:
        description: '指定进化策略名'
        required: false
        type: string
        default: ''

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: write
      actions: read

    steps:
      - name: 禁用 Git 符号链接
        run: git config --global core.symlinks false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd alphaevo
          pip install -e .
          pip install requests baostock akshare pandas numpy

      - name: 双窗口趋势判断 + 多信号验证
        id: select_strategy
        run: |
          cd ${{ github.workspace }}
          if [ -n "${{ github.event.inputs.strategy }}" ]; then
            echo "${{ github.event.inputs.strategy }}" > selected_strategy.txt
            STRATEGY="${{ github.event.inputs.strategy }}"
            echo "SELECTED_STRATEGY=$STRATEGY" >> $GITHUB_ENV
            echo "📊 使用指定策略: $STRATEGY"
          else
            python scripts/select_strategy.py
            STRATEGY=$(cat selected_strategy.txt)
            echo "SELECTED_STRATEGY=$STRATEGY" >> $GITHUB_ENV
            echo "📊 选定策略: $STRATEGY"
          fi
          if [ -f "market_state.json" ]; then
            mkdir -p daily_stock_analysis/reports/
            cp market_state.json daily_stock_analysis/reports/market_state.json
          fi

      - name: 准备策略文件
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          if [ -f "strategies/builtin/${STRATEGY}.yaml" ]; then
            cp "strategies/builtin/${STRATEGY}.yaml" "strategies/${STRATEGY}.yaml"
            echo "✅ 已复制策略: ${STRATEGY}.yaml"
          else
            echo "❌ 策略文件不存在: strategies/builtin/${STRATEGY}.yaml"
            echo "📋 可用策略列表:"
            ls -la strategies/builtin/*.yaml 2>/dev/null || echo "无策略文件"
            exit 1
          fi

      - name: 导入策略
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          alphaevo strategy import strategies/${STRATEGY}.yaml || true
          alphaevo strategy list

      - name: Run AlphaEvo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LITELLM_MODEL: openai/${{ secrets.OPENAI_MODEL }}
        run: |
          cd alphaevo
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          echo "🚀 进化策略: $STRATEGY"
          alphaevo evolve $STRATEGY --method llm --rounds 5 --samples 90

      - name: 自动部署冠军策略
        run: |
          STRATEGY="${{ env.SELECTED_STRATEGY }}"
          CHAMPION_FILE="alphaevo/reports/rsi_reversion_v1_champion.yaml"
          TARGET_FILE="alphaevo/strategies/builtin/${STRATEGY}.yaml"
          BACKUP_FILE="alphaevo/strategies/builtin/${STRATEGY}_$(date +%Y%m%d_%H%M%S).yaml"
          
          if [ -f "$CHAMPION_FILE" ]; then
            # 备份当前策略
            if [ -f "$TARGET_FILE" ]; then
              cp "$TARGET_FILE" "$BACKUP_FILE"
              echo "✅ 已备份策略至: $BACKUP_FILE"
            fi
            cp "$CHAMPION_FILE" "$TARGET_FILE"
            echo "✅ 冠军策略已部署到: $TARGET_FILE"
            cp "$CHAMPION_FILE" "alphaevo/strategies/${STRATEGY}.yaml"
            echo "✅ 已同步到根目录"
          else
            echo "⚠️ 冠军策略文件不存在，跳过部署"
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-evo-reports-${{ github.run_number }}
          path: |
            alphaevo/reports/
            selected_strategy.txt
            market_state.json
          retention-days: 14